version: '3'

vars:
  # If you run bare environment or activated venv, set '' (blank string)
  RUN_PYTHON: 'uv run'
  SPHINX_DEFAULT_BUILD: 'dirhtml'
  SPHINX_SOURCE_DIR: 'sphinx-themes/sample-docs'
  SPHINX_OUTPUT_DIR: 'build'
  SPHINX_OPTIONS: '-c .'

env:
  SPHINXINTL_TRANSLATOR: "Kazuya Takei <myself@attakei.net>"

tasks:
  setup:
    cmds:
      - 'cp -pR sphinx-themes/src ./'
  dev:
    desc: 'Run docs server'
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - '{{.RUN_PYTHON}} sphinx-autobuild {{.SPHINX_OPTIONS}} -b {{.SPHINX_DEFAULT_BUILD}} {{.SPHINX_SOURCE_DIR}} {{.SPHINX_OUTPUT_DIR}}/{{.SPHINX_DEFAULT_BUILD}}'
  build-*:
    desc: 'Make docs'
    dir: '{{.TASKFILE_DIR}}'
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - '{{.RUN_PYTHON}} sphinx-build {{.SPHINX_OPTIONS}} -M {{.TARGET}} {{.SPHINX_SOURCE_DIR}} {{.SPHINX_OUTPUT_DIR}}'
  build:
    desc: 'Make docs (default target)'
    deps:
      - 'build-{{.SPHINX_DEFAULT_BUILD}}'
  help:
    desc: 'Display help of docs'
    deps:
      - 'build-help'
  clean:
    desc: 'Clean build files of docs'
    deps:
      - 'build-clean'
