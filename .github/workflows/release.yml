name: 'Release new version'

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: './.github/actions/setup-aqua'
      - uses: flatt-security/setup-takumi-guard-pypi@v1.0.1
      - name: Build package
        run: |
          uv build
          ls -l dist
      - uses: actions/upload-artifact@v7
        with:
          name: packages-${{ github.ref_name }}
          path: dist/
  gh-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: packages-${{ github.ref_name }}
          path: dist/
      - uses: ncipollo/release-action@v1
        with:
          artifacts: 'dist/*'
          bodyFile: '.github/release-body.md'
          draft: false
          name: Release ${{ github.ref_name }}
          tag: ${{ github.ref }}
          prerelease: false
  publish-pypi:
    needs: [build]
    runs-on: ubuntu-latest
    if: success() && ${{ needs.prepare.outputs.is-release }}
    environment:
      name: 'pypi'
      url: 'https://pypi.org/p/atsphinx-bulma'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: packages-${{ github.ref_name }}
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
  deploy-docs:
    needs: [build]
    permissions:
      pages: write
      id-token: write
    uses: './.github/workflows/deploy-docs.yml'
    secrets: inherit
